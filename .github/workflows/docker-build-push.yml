name: Docker Build CI & Helm Update

on:
  push:
    tags:
      - "*.*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Set up QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3️⃣ Set up Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4️⃣ Set project name
      - name: Set environment variables
        run: |
          echo "BUILD_PROJ=plan-eo-dashboard" >> $GITHUB_ENV

      # 5️⃣ Extract version from tag
      - name: Get Tag Version
        run: |
          IMAGE_TAG=${GITHUB_REF#refs/tags/}
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

          echo "Updating Helm values..."
          yq eval ".image.tag = \"${IMAGE_TAG}\"" -i kubernetes/prod/values.yaml

      # 6️⃣ Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 7️⃣ Build & Push Image
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.BUILD_PROJ }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.BUILD_PROJ }}:${{ env.IMAGE_TAG }}

      # 8️⃣ Commit updated Helm values.yaml
      - name: Commit Version Update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[skip ci] update helm image tag to ${{ env.IMAGE_TAG }}"
          branch: main
          file_pattern: kubernetes/prod/values.yaml
          commit_user_name: GitHub Actions Bot
          commit_user_email: github@virginia.edu
          commit_author: GitHub Actions <github@virginia.edu>