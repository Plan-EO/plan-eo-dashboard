apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plan-eo-dashboard-ingress
  namespace: plan-eo-dashboard
  annotations:
    kubernetes.io/ingress.class: "nginx"

    cert-manager.io/cluster-issuer: rc-hpc-sectigo-clusterissuer

    kubernetes.io/ingress.allow-http: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    nginx.ingress.kubernetes.io/proxy-body-size: 32m

spec:
  rules:
    - host: plan-eo-dashboard.prod-ext-k8s.rc.virginia.edu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plan-eo-dashboard-prod
                port:
                  number: 80

  tls:
    - hosts:
        - plan-eo-dashboard.prod-ext-k8s.rc.virginia.edu
      secretName: plan-eo-dashboard-tls-ingress-secret