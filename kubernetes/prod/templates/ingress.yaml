apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plan-eo-dashboard-ingress
  namespace: plan-eo-storage
  annotations:
    kubernetes.io/ingress.class: nginx

    # SSL / cert-manager
    cert-manager.io/cluster-issuer: letsencrypt-cluster-issuer
    acme.cert-manager.io/http01-edit-in-place: "true"

    # NGINX tuning
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"

    # Optional (only if needed for SPA routing)
    nginx.ingress.kubernetes.io/rewrite-target: /

spec:
  tls:
    - hosts:
        - plan-eo-dashboard.ext-k8s.rc.virginia.edu
      secretName: plan-eo-dashboard-tls

  rules:
    - host: plan-eo-dashboard.ext-k8s.rc.virginia.edu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plan-eo-dashboard
                port:
                  number: 80