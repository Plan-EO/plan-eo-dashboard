apiVersion: v1
kind: Service
metadata:
  name: {{ include "plan-eo-dashboard.fullname" . }}
  labels:
    {{- include "plan-eo-dashboard.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}

  selector:
    {{- include "plan-eo-dashboard.selectorLabels" . | nindent 4 }}

  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP