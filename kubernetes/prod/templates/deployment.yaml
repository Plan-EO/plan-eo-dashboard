apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "plan-eo.fullname" . }}-app
  labels:
    {{- include "plan-eo.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      {{- include "plan-eo.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "plan-eo.labels" . | nindent 8 }}

    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}

      containers:
        - name: {{ .Chart.Name }}

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          volumeMounts:
            - name: data-volume
              mountPath: /usr/share/nginx/html/data
              subPath: data

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: {{ .Values.pvc.claimName }}